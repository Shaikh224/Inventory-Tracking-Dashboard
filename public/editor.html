<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog:Editor</title>

    <link rel="stylesheet" href="CSS/home.css">
    <link rel="stylesheet" href="CSS/editor.css">


</head>
<body>
    <nav class="navbar">
        <img src="img/logo.png" class="logo" alt="">
        <ul class="links-container">
            <li class="link-item"><a href="/" class="link">Home</a></li>
            <li class="link-item"><a href="/editor" class="link">Editor</a></li>
        </ul>


    </nav>

     <!-- Password form container -->
     <div class="password-form-container">
        <form id="passwordForm" class="password-form">
            <input type="password" id="passwordInput" class="password-input" placeholder="Enter password">
            <button type="submit" class="btn submit-btn">Enter</button>
        </form>
        <p id="errorMessage" class="error-message"></p>
    </div>

    <!-- Editor container -->
    <div id="editorContainer">
        <div class="banner">
            <input type="file" accept="image/*" id="banner-upload" hidden>
            <label for="banner-upload" class="banner-upload-btn"><img src="img/google.png" alt="upload banner"></label>
        </div>

        <div class="blog">
            <textarea type="text" class="title" placeholder="Blog Title..."></textarea>
            <textarea type="text" class="article" placeholder="Start Writing Here...."></textarea>
        </div>

        <div class="blog-options">
            <button class="btn dark publish-btn">Publish</button>
            <input type="file" accept="image/*" id="image-upload" hidden>
            <label for="image-upload" class="btn grey upload-btn">Upload Image</label>
        </div>
    </div>
    


   
    <script type="module">
        import { app, db } from '../js/firebase.js';

        console.log('Firebase App:', app);
        console.log('Firestore Database:', db);

        window.db = db;
    </script>
    <script type="module" src="js/editor.js"></script>




    
</body>
</html>
